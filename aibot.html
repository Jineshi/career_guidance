<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerGuide - AI Career Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f2f8; color: #333;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        header { background: white; box-shadow: 0 2px 10px rgba(0,0,0,.08); flex-shrink: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: .8rem 2rem; max-width: 1400px; margin: 0 auto; }
        .logo { font-size: 1.4rem; font-weight: bold; color: #2c3e50; text-decoration: none; }
        .nav-links { display: flex; list-style: none; gap: 1.2rem; align-items: center; }
        .nav-links a { text-decoration: none; color: #666; font-weight: 500; padding: .45rem .9rem; border-radius: 6px; transition: all .2s; display: flex; align-items: center; gap: .4rem; font-size: .9rem; }
        .nav-links a:hover { background: #f0f0f0; color: #333; }
        .nav-links a.active { background: #2c3e50; color: white; }
        .icon { width: 16px; height: 16px; }

        .page-body { flex: 1; display: flex; overflow: hidden; max-width: 1200px; width: 100%; margin: 0 auto; padding: 1rem; gap: 1rem; }

        /* SIDEBAR */
        .sidebar { width: 255px; flex-shrink: 0; display: flex; flex-direction: column; gap: .8rem; overflow-y: auto; }
        .sb-card { background: white; border-radius: 14px; padding: 1.2rem; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
        .sb-card h4 { font-size: .78rem; text-transform: uppercase; letter-spacing: .07em; color: #999; margin-bottom: .8rem; font-weight: 700; }
        .user-ctx { display: flex; align-items: center; gap: .7rem; margin-bottom: .8rem; }
        .u-av { width: 36px; height: 36px; background: linear-gradient(135deg,#667eea,#764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: .95rem; flex-shrink: 0; }
        .u-name { font-weight: 700; font-size: .88rem; color: #2c3e50; }
        .u-sub { font-size: .74rem; color: #888; }
        .ctx-pill { display: flex; align-items: center; gap: .4rem; background: #f0f4ff; border: 1px solid #d0d9ff; border-radius: 8px; padding: .38rem .7rem; font-size: .77rem; color: #4a5fc4; margin-bottom: .35rem; }
        .ctx-pill.g { background: #f0fff4; border-color: #b7e4c7; color: #276749; }
        .ctx-pill.o { background: #fff8f0; border-color: #ffd8a8; color: #c05621; }
        .sug-btn { display: block; width: 100%; text-align: left; background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 9px; padding: .58rem .8rem; font-size: .79rem; color: #444; cursor: pointer; margin-bottom: .35rem; transition: all .2s; line-height: 1.45; font-family: inherit; }
        .sug-btn:hover { background: #e9f0ff; border-color: #667eea; color: #2c3e50; }
        .clear-btn { display: flex; align-items: center; justify-content: center; gap: .4rem; width: 100%; padding: .55rem; border-radius: 9px; background: #fff0f0; border: 1px solid #ffc9c9; color: #c92a2a; font-size: .82rem; font-weight: 600; cursor: pointer; transition: all .2s; font-family: inherit; }
        .clear-btn:hover { background: #ffe3e3; }

        /* CHAT */
        .chat-wrap { flex: 1; display: flex; flex-direction: column; background: white; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.08); overflow: hidden; min-width: 0; }
        .chat-hdr { background: linear-gradient(135deg,#667eea,#764ba2); color: white; padding: 1rem 1.4rem; display: flex; align-items: center; gap: .8rem; flex-shrink: 0; }
        .bot-ic { width: 42px; height: 42px; background: rgba(255,255,255,.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .chat-hdr-txt h2 { font-size: 1.05rem; font-weight: 700; }
        .chat-hdr-txt p { font-size: .8rem; opacity: .85; }
        .online-dot { width: 8px; height: 8px; background: #51cf66; border-radius: 50%; margin-left: auto; box-shadow: 0 0 0 3px rgba(81,207,102,.25); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 3px rgba(81,207,102,.25)}50%{box-shadow:0 0 0 6px rgba(81,207,102,.08)} }

        .chat-msgs { flex: 1; overflow-y: auto; padding: 1.2rem; scroll-behavior: smooth; }
        .chat-msgs::-webkit-scrollbar { width: 5px; }
        .chat-msgs::-webkit-scrollbar-thumb { background: #d0d5dd; border-radius: 10px; }

        .msg-row { display: flex; gap: .7rem; margin-bottom: 1rem; align-items: flex-start; animation: fadeUp .25s ease; }
        .msg-row.user { flex-direction: row-reverse; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }

        .m-av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .85rem; flex-shrink: 0; font-weight: 700; }
        .m-av.bot { background: linear-gradient(135deg,#667eea,#764ba2); color: white; }
        .m-av.usr { background: #2c3e50; color: white; }

        .m-bbl { max-width: 78%; padding: .85rem 1.1rem; border-radius: 16px; font-size: .9rem; line-height: 1.7; }
        .m-bbl.bot { background: #f4f6ff; border: 1px solid #e0e6ff; border-top-left-radius: 4px; }
        .m-bbl.usr { background: linear-gradient(135deg,#667eea,#764ba2); color: white; border-top-right-radius: 4px; white-space: pre-wrap; }

        /* Markdown in bot bubbles */
        .m-bbl.bot h2,.m-bbl.bot h3 { color: #2c3e50; margin: .7rem 0 .3rem; }
        .m-bbl.bot h2 { font-size: 1rem; }
        .m-bbl.bot h3 { font-size: .93rem; }
        .m-bbl.bot p { margin-bottom: .45rem; }
        .m-bbl.bot p:last-child { margin-bottom: 0; }
        .m-bbl.bot ul,.m-bbl.bot ol { padding-left: 1.3rem; margin: .3rem 0 .5rem; }
        .m-bbl.bot li { margin-bottom: .2rem; }
        .m-bbl.bot strong { color: #2c3e50; font-weight: 700; }
        .m-bbl.bot em { font-style: italic; color: #555; }
        .m-bbl.bot code { background: #e8edff; padding: .12rem .38rem; border-radius: 4px; font-size: .82rem; font-family: monospace; color: #5563d0; }
        .m-bbl.bot blockquote { border-left: 3px solid #667eea; padding-left: .8rem; color: #666; margin: .4rem 0; font-style: italic; }
        .m-bbl.bot hr { border: none; border-top: 1px solid #e0e6ff; margin: .6rem 0; }
        .m-time { font-size: .7rem; color: #bbb; margin-top: .25rem; padding: 0 .2rem; }
        .msg-row.user .m-time { text-align: right; }

        /* Typing */
        .typing-row { display: flex; gap: .7rem; align-items: flex-start; margin-bottom: 1rem; }
        .typing-bbl { background: #f4f6ff; border: 1px solid #e0e6ff; border-radius: 16px; border-top-left-radius: 4px; padding: .85rem 1.1rem; display: flex; gap: 4px; align-items: center; }
        .t-dot { width: 7px; height: 7px; background: #667eea; border-radius: 50%; animation: tdot 1.4s infinite ease-in-out; }
        .t-dot:nth-child(2){animation-delay:.2s}.t-dot:nth-child(3){animation-delay:.4s}
        @keyframes tdot{0%,80%,100%{transform:translateY(0);opacity:.35}40%{transform:translateY(-6px);opacity:1}}

        /* Input */
        .input-area { border-top: 1px solid #f0f0f0; padding: .9rem 1.2rem; display: flex; gap: .7rem; align-items: flex-end; background: white; flex-shrink: 0; }
        .c-input { flex: 1; border: 2px solid #e4e8f0; border-radius: 14px; padding: .75rem 1rem; font-size: .93rem; font-family: inherit; resize: none; outline: none; min-height: 48px; max-height: 120px; transition: border-color .2s; line-height: 1.4; }
        .c-input:focus { border-color: #667eea; }
        .c-input::placeholder { color: #bbb; }
        .send-btn { background: linear-gradient(135deg,#667eea,#764ba2); color: white; border: none; width: 48px; height: 48px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; }
        .send-btn:hover:not(:disabled) { transform: scale(1.06); opacity: .9; }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .err-bar { background: #fff0f0; border: 1px solid #ffc9c9; border-radius: 10px; padding: .65rem 1.1rem; font-size: .82rem; color: #c92a2a; margin: .4rem 1.2rem; display: none; }

        @media(max-width:900px){.sidebar{display:none}}
        @media(max-width:768px){.nav-links{display:none}.page-body{padding:.5rem}.m-bbl{max-width:90%}}
    </style>
</head>

<script>
// ── AUTH ──
function getUsername() {
    try {
        const cu = localStorage.getItem('currentUser');
        if (cu) { const o = JSON.parse(cu); if (o && o.username) return o.username; }
        return localStorage.getItem('username') || null;
    } catch(e) { return null; }
}

// ── MARKDOWN RENDERER ──
function md(text) {
    // Escape HTML first (except we need to allow our own tags after)
    let t = text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/^---$/gm, '<hr>')
        .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/^\s*[-*] (.+)$/gm, '<li>$1</li>')
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
    // Wrap consecutive <li> in <ul>
    t = t.replace(/(<li>[\s\S]*?<\/li>)(\n<li>[\s\S]*?<\/li>)*/g, m => '<ul>' + m + '</ul>');
    // Paragraphs
    t = t.split(/\n\n+/).map(block => {
        if (/^<(h[123]|ul|ol|blockquote|pre|hr)/.test(block.trim())) return block;
        return '<p>' + block.replace(/\n/g,'<br>') + '</p>';
    }).join('');
    return t;
}

// ── STATE ──
const history = []; // [{role:'user'|'bot', text:'...'}]
let userCtx = {};
let busy = false;

// ── LOAD USER CONTEXT ──
async function loadCtx() {
    const un = getUsername();
    if (un) {
        userCtx.username = un;
        document.getElementById('sidebarAvatar').textContent = un[0].toUpperCase();
        document.getElementById('sidebarName').textContent = un;
        document.getElementById('sidebarSub').textContent = 'Logged in ✓';
    }
    // Load latest test result from sessionStorage
    try {
        const raw = sessionStorage.getItem('latestResult');
        if (raw) {
            const r = JSON.parse(raw);
            userCtx.result = r;
            document.getElementById('contextPills').innerHTML =
                `<div class="ctx-pill">📊 ${r.category || '–'}</div>` +
                `<div class="ctx-pill g">🎯 ${r.top_career || '–'}</div>` +
                `<div class="ctx-pill o">⭐ Score: ${r.score || 0}/100</div>`;
            if (!un) document.getElementById('sidebarSub').textContent =
                r.suitability === 'highly' ? 'Highly suitable' : 'Moderate fit';
        }
    } catch(e) {}
    // Load saved career interests
    if (un) {
        try {
            const res = await fetch('get_interests.php?username=' + encodeURIComponent(un));
            const d = await res.json();
            if (d.interests && d.interests.length)
                userCtx.interests = d.interests.map(i => i.career_name);
        } catch(e) {}
    }
}

// ── BUILD PROMPT FOR GEMINI ──
// ai_proxy.php accepts a single { prompt } string.
// We embed the system context + full conversation history into one prompt.
function buildPrompt(userMessage) {
    // System / persona block
    let sys = `You are CareerGuide AI — an expert, friendly career counsellor specialising in the Indian job market, entrance exams, and global career paths.

You help students and professionals with:
- Career planning and exploration tailored to India
- Entrance exams: JEE, NEET, CAT, GATE, UPSC, CLAT, NIFT, NID, CUET, etc.
- Skill development roadmaps and learning resources
- Resume/CV writing and interview preparation
- Salary benchmarks in LPA, top Indian colleges, top hiring companies
- Career transitions and upskilling

Rules:
- Be specific, encouraging, and actionable — no generic filler
- Use **bold**, bullet points, and ## headers for structured responses
- Include Indian context by default (₹ salaries in LPA, Indian colleges, Indian companies)
- Keep answers 150–350 words unless a detailed breakdown is requested
- Always end with a short follow-up question to continue the conversation`;

    // User context block
    let ctxBlock = '';
    if (userCtx.username) ctxBlock += `\nUser: ${userCtx.username}`;
    if (userCtx.result) {
        const r = userCtx.result;
        ctxBlock += `\nLatest assessment — Category: ${r.category}, Specialisation: ${r.subcategory}, Top career: ${r.top_career}, Score: ${r.score}/100, Suitability: ${r.suitability}`;
        if (r.traits) {
            const top = Object.entries(r.traits).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([k,v])=>`${k}(${v})`).join(', ');
            ctxBlock += `, Top traits: ${top}`;
        }
        if (r.careers && r.careers.length > 1)
            ctxBlock += `, Other matches: ${r.careers.slice(1,4).map(c=>c.name+' '+c.matchPct+'%').join(', ')}`;
    }
    if (userCtx.interests && userCtx.interests.length)
        ctxBlock += `\nSaved interests: ${userCtx.interests.join(', ')}`;

    if (ctxBlock) sys += '\n\n--- USER CONTEXT ---' + ctxBlock;

    // Conversation history block (last 10 turns max)
    const recent = history.slice(-10);
    let conv = '';
    if (recent.length) {
        conv = '\n\n--- CONVERSATION HISTORY ---\n';
        conv += recent.map(m => (m.role === 'user' ? 'User: ' : 'Assistant: ') + m.text).join('\n');
    }

    // Final prompt
    return sys + conv + '\n\n--- NEW MESSAGE ---\nUser: ' + userMessage + '\nAssistant:';
}

// ── WELCOME MESSAGE ──
function showWelcome() {
    const un = userCtx.username;
    const r = userCtx.result;
    let msg;
    if (un && r) {
        msg = `👋 Welcome back, **${un}**!\n\nI can see your latest assessment — **${r.category}**, top match: **${r.top_career}**, score: **${r.score}/100**.\n\nI can help you:\n- Deep-dive into **${r.top_career}** — roadmap, colleges, salaries\n- Find the right entrance exams for your field\n- Build a skill plan based on your strongest traits\n- Prepare for interviews\n\nWhat would you like to explore?`;
    } else if (un) {
        msg = `👋 Hello, **${un}**! I'm your CareerGuide AI.\n\nI'm here to help with career planning, entrance exams, skill development, interview prep, and more — all India-focused.\n\n💡 **Tip:** Take an assessment under **Tests** so I can give you fully personalised advice!\n\nWhat's on your mind?`;
    } else {
        msg = `👋 Hello! I'm **CareerGuide AI**, your career counsellor for the Indian job market.\n\nI can help you with:\n- **Career exploration** — find what suits you\n- **Entrance exams** — JEE, NEET, CAT, GATE and more\n- **Skill development** — what to learn and where\n- **Interview prep** and resume writing\n\n🔐 **Log in** and take a test for personalised advice!\n\nWhat would you like to know?`;
    }
    addBotMsg(msg, true);
}

// ── SEND MESSAGE ──
async function sendMessage() {
    const inp = document.getElementById('chatInput');
    const text = inp.value.trim();
    if (!text || busy) return;

    inp.value = ''; autoResize(inp); hideErr();
    addUserMsg(text);

    const prompt = buildPrompt(text);
    history.push({ role: 'user', text });

    busy = true;
    document.getElementById('sendBtn').disabled = true;
    const { bubble } = addBotMsg('', false);
    showTyping(true);

    try {
        const resp = await fetch('ai_proxy.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt })
        });

        const data = await resp.json();

        showTyping(false);

        if (!resp.ok || data.error) {
            bubble.innerHTML = '⚠️ ' + (data.error || 'Something went wrong. Please try again.');
            showErr(data.error || 'Request failed');
        } else {
            const reply = data.content[0].text;
            bubble.innerHTML = md(reply);
            history.push({ role: 'bot', text: reply });
            // Keep history to last 10 turns
            if (history.length > 20) history.splice(0, 2);
        }

    } catch(err) {
        showTyping(false);
        bubble.innerHTML = '⚠️ Network error. Make sure XAMPP is running and ai_proxy.php is in htdocs.';
        showErr(err.message);
    }

    busy = false;
    document.getElementById('sendBtn').disabled = false;
    scrollBot();
    document.getElementById('chatInput').focus();
}

// ── DOM HELPERS ──
function addUserMsg(text) {
    const c = document.getElementById('chatMsgs');
    const un = getUsername();
    const row = document.createElement('div');
    row.className = 'msg-row user';
    const av = document.createElement('div');
    av.className = 'm-av usr';
    av.textContent = un ? un[0].toUpperCase() : '👤';
    const wrap = document.createElement('div');
    const bbl = document.createElement('div');
    bbl.className = 'm-bbl usr';
    bbl.textContent = text;
    const time = document.createElement('div');
    time.className = 'm-time'; time.textContent = getTime();
    wrap.appendChild(bbl); wrap.appendChild(time);
    row.appendChild(wrap); row.appendChild(av);
    c.appendChild(row); scrollBot();
}

function addBotMsg(text, isMarkdown) {
    const c = document.getElementById('chatMsgs');
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    const av = document.createElement('div');
    av.className = 'm-av bot'; av.textContent = '🤖';
    const bubble = document.createElement('div');
    bubble.className = 'm-bbl bot';
    bubble.innerHTML = isMarkdown ? md(text) : text;
    const time = document.createElement('div');
    time.className = 'm-time'; time.textContent = getTime();
    const wrap = document.createElement('div');
    wrap.appendChild(bubble); wrap.appendChild(time);
    row.appendChild(av); row.appendChild(wrap);
    c.appendChild(row); scrollBot();
    return { row, bubble };
}

function showTyping(show) {
    let el = document.getElementById('typingRow');
    if (show && !el) {
        const c = document.getElementById('chatMsgs');
        el = document.createElement('div');
        el.id = 'typingRow'; el.className = 'typing-row';
        el.innerHTML = `<div class="m-av bot">🤖</div><div class="typing-bbl"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`;
        c.appendChild(el); scrollBot();
    } else if (!show && el) { el.remove(); }
}

function scrollBot() { const c = document.getElementById('chatMsgs'); c.scrollTop = c.scrollHeight; }
function getTime() { return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function showErr(m) { const e = document.getElementById('errBar'); e.textContent = '⚠️ ' + m; e.style.display = 'block'; }
function hideErr() { document.getElementById('errBar').style.display = 'none'; }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function useSug(btn) {
    const text = btn.textContent.replace(/^[^\w❓]/,'').trim();
    document.getElementById('chatInput').value = text;
    document.getElementById('chatInput').focus();
    sendMessage();
}
function clearChat() {
    if (!confirm('Clear the entire conversation?')) return;
    history.length = 0;
    document.getElementById('chatMsgs').innerHTML = '';
    showWelcome();
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', async () => {
    await loadCtx();
    showWelcome();
    document.getElementById('chatInput').focus();
});
</script>
</body>
